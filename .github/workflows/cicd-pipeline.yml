name: AI-DevOps-CI-CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Build Docker Image
      run: |
        docker build -t ai-devops-app:latest -f docker/Dockerfile .

    - name: Run Infrastructure Linter
      run: |
        cd terraform
        terraform init -backend=false
        terraform validate

    - name: Test AI Scripts
      run: |
        python3 ai-monitor/anomaly_detector.py --test-mode
        echo "AI Component Validation Passed"
